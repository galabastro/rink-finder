<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Ice Times</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ice: #dff0f7;
      --ice-mid: #b8dff0;
      --deep: #07111a;
      --deep-2: #0e1f2d;
      --deep-3: #162d40;
      --accent: #5bc8f5;
      --accent-2: #f0c142;
      --text: #e8f4fb;
      --text-dim: #7aaec7;
      --radius: 12px;
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Ice texture background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(91,200,245,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 90% 90%, rgba(91,200,245,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Rink lines decoration ── */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 900px; height: 100vh;
      border-left: 1px solid rgba(91,200,245,0.06);
      border-right: 1px solid rgba(91,200,245,0.06);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── Header ── */
    header {
      padding: 3rem 0 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .header-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.8;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 10vw, 6rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
      text-shadow: 0 0 60px rgba(91,200,245,0.3);
    }

    h1 span {
      color: var(--accent);
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .last-updated {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 8px var(--accent-2);
      animation: pulse 2s ease-in-out infinite;
      display: inline-block;
      margin-right: 0.4rem;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Date nav ── */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      scrollbar-width: none;
    }

    .date-nav::-webkit-scrollbar { display: none; }

    .date-btn {
      flex-shrink: 0;
      background: var(--deep-2);
      border: 1px solid rgba(91,200,245,0.12);
      border-radius: 8px;
      color: var(--text-dim);
      cursor: pointer;
      padding: 0.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
      transition: all 0.2s;
      min-width: 56px;
    }

    .date-btn .day-name {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .date-btn .day-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      line-height: 1;
    }

    .date-btn:hover {
      border-color: rgba(91,200,245,0.35);
      color: var(--text);
    }

    .date-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--deep);
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-right: 0.25rem;
    }

    .filter-chip {
      background: transparent;
      border: 1px solid rgba(91,200,245,0.2);
      border-radius: 100px;
      color: var(--text-dim);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      padding: 0.3rem 0.85rem;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .filter-chip .chip-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .filter-chip:hover {
      border-color: rgba(91,200,245,0.5);
      color: var(--text);
    }

    .filter-chip.active {
      border-color: var(--accent);
      background: rgba(91,200,245,0.1);
      color: var(--text);
    }

    /* ── Sessions grid ── */
    #sessions-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    /* ── Session card ── */
    .session-card {
      background: var(--deep-2);
      border: 1px solid rgba(91,200,245,0.1);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0 1.25rem;
      align-items: center;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeIn 0.3s ease both;
    }

    .session-card:hover {
      border-color: rgba(91,200,245,0.3);
      transform: translateY(-1px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-time {
      text-align: center;
      min-width: 72px;
    }

    .time-start {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      line-height: 1;
      color: var(--text);
    }

    .time-end {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 0.1rem;
    }

    .card-divider {
      width: 1px;
      height: 40px;
      background: rgba(91,200,245,0.12);
      display: none; /* shown via grid layout */
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      min-width: 0;
    }

    .card-session-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-rink {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .rink-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.3rem;
    }

    .card-price {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent-2);
    }

    .card-spots {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .spots-low { color: #f56e5b; }

    /* ── Empty / error states ── */
    .state-box {
      grid-column: 1 / -1;
      padding: 4rem 2rem;
      text-align: center;
      border: 1px dashed rgba(91,200,245,0.15);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .state-icon {
      font-size: 2.5rem;
      line-height: 1;
    }

    .state-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .state-sub {
      font-size: 0.8rem;
      color: var(--text-dim);
      opacity: 0.7;
      max-width: 340px;
    }

    /* ── Rink section headers ── */
    .rink-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 2rem 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(91,200,245,0.08);
    }

    .rink-header:first-child { margin-top: 0; }

    .rink-header-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    .rink-header-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .rink-header-location {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-left: auto;
    }

    .rink-header-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .rink-header-link:hover { opacity: 1; }

    /* ── No sessions for a rink ── */
    .no-sessions {
      font-size: 0.8rem;
      color: var(--text-dim);
      padding: 0.75rem 1.25rem;
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
    }

    .error-note {
      font-size: 0.75rem;
      color: #f56e5b;
      padding: 0.75rem 1.25rem;
      background: rgba(245,110,91,0.06);
      border-radius: 8px;
      border: 1px solid rgba(245,110,91,0.2);
      font-family: 'DM Mono', monospace;
    }

    /* ── Footer ── */
    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(91,200,245,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    footer p {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      opacity: 0.5;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--deep-2) 25%, var(--deep-3) 50%, var(--deep-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-card {
      height: 80px;
      border-radius: var(--radius);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .session-card {
        grid-template-columns: auto 1fr;
      }
      .card-meta { display: none; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="header-eyebrow">⛸ Seattle Area</div>
    <h1>Local<br><span>Ice Times</span></h1>
    <div class="header-meta">
      <span class="last-updated" id="last-updated">
        <span class="status-dot"></span>Loading schedule…
      </span>
    </div>
  </header>

  <!-- Date navigation -->
  <div class="date-nav" id="date-nav"></div>

  <!-- Rink filter chips -->
  <div class="filter-bar" id="filter-bar">
    <span class="filter-label">Rinks</span>
  </div>

  <!-- Sessions -->
  <div id="sessions-container">
    <!-- Loading skeletons -->
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card" style="opacity:.7"></div>
    <div class="skeleton skeleton-card" style="opacity:.4"></div>
  </div>

  <footer>
    <p>Data scraped from public booking pages every 6 hours via GitHub Actions.</p>
    <p>Not affiliated with any rink. <a href="schedule.json" target="_blank">Raw JSON ↗</a></p>
  </footer>

</div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────
let allData = null;
let activeDate = null;
let activeRinks = new Set(); // empty = show all

// ─── Helpers ───────────────────────────────────────────────────────────────
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dateLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return { dayName: DAY_NAMES[d.getDay()], dayNum: d.getDate(), month: MONTH_NAMES[d.getMonth()] };
}

function fmt12(timeStr) {
  // Parses "HH:MM" or "HH:MM:SS" or ISO datetime and returns "3:30 PM"
  if (!timeStr) return '?';
  try {
    const d = new Date(timeStr);
    if (!isNaN(d)) {
      let h = d.getHours(), m = d.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
    }
    // Try "HH:MM" format
    const [hh, mm] = timeStr.split(':').map(Number);
    const ampm = hh >= 12 ? 'PM' : 'AM';
    const h = hh % 12 || 12;
    return `${h}:${String(mm).padStart(2,'0')} ${ampm}`;
  } catch { return timeStr; }
}

function sessionDate(session) {
  // Returns "YYYY-MM-DD" from a session's start field
  if (!session.start) return null;
  try {
    const d = new Date(session.start);
    if (!isNaN(d)) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
  } catch {}
  return null;
}

// ─── Build date nav (next 7 days) ──────────────────────────────────────────
function buildDateNav() {
  const nav = document.getElementById('date-nav');
  nav.innerHTML = '';
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    const str = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    dates.push(str);
  }

  for (const dateStr of dates) {
    const { dayName, dayNum } = dateLabel(dateStr);
    const btn = document.createElement('button');
    btn.className = 'date-btn' + (dateStr === activeDate ? ' active' : '');
    btn.innerHTML = `<span class="day-name">${dayName}</span><span class="day-num">${dayNum}</span>`;
    btn.addEventListener('click', () => {
      activeDate = dateStr;
      buildDateNav();
      render();
    });
    nav.appendChild(btn);
  }
}

// ─── Build rink filter chips ────────────────────────────────────────────────
function buildFilters() {
  const bar = document.getElementById('filter-bar');
  // Remove old chips (keep label)
  bar.querySelectorAll('.filter-chip').forEach(el => el.remove());

  if (!allData?.rinks?.length) return;

  for (const rink of allData.rinks) {
    const chip = document.createElement('button');
    chip.className = 'filter-chip' + (activeRinks.size === 0 || activeRinks.has(rink.id) ? ' active' : '');
    chip.innerHTML = `<span class="chip-dot" style="background:${rink.color}"></span>${rink.name}`;
    chip.addEventListener('click', () => {
      if (activeRinks.has(rink.id)) {
        activeRinks.delete(rink.id);
        // If nothing active, show all
      } else {
        activeRinks.add(rink.id);
      }
      buildFilters();
      render();
    });
    bar.appendChild(chip);
  }
}

// ─── Render sessions ────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('sessions-container');
  container.innerHTML = '';

  if (!allData) return;

  const showAll = activeRinks.size === 0;
  let totalShown = 0;

  for (const rink of allData.rinks) {
    if (!showAll && !activeRinks.has(rink.id)) continue;

    // Rink header
    const header = document.createElement('div');
    header.className = 'rink-header';
    header.innerHTML = `
      <span class="rink-header-dot" style="background:${rink.color}"></span>
      <span class="rink-header-name">${rink.name}</span>
      <span class="rink-header-location">${rink.location}</span>
      <a class="rink-header-link" href="${rink.url}" target="_blank" rel="noopener">Book ↗</a>
    `;
    container.appendChild(header);

    if (rink.error) {
      const err = document.createElement('div');
      err.className = 'error-note';
      err.textContent = `⚠ Scrape error: ${rink.error}`;
      container.appendChild(err);
      continue;
    }

    // Filter sessions to selected date
    const sessions = (rink.sessions || []).filter(s => {
      if (!activeDate) return true;
      return sessionDate(s) === activeDate;
    });

    if (sessions.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'no-sessions';
      empty.textContent = rink.sessions?.length
        ? `No sessions found for this date.`
        : `No session data yet — run the scraper to populate.`;
      container.appendChild(empty);
      continue;
    }

    // Sort by start time
    sessions.sort((a, b) => new Date(a.start) - new Date(b.start));

    for (const [i, session] of sessions.entries()) {
      const card = document.createElement('div');
      card.className = 'session-card';
      card.style.animationDelay = `${i * 40}ms`;

      const startFmt = fmt12(session.start);
      const endFmt = session.end ? fmt12(session.end) : null;
      const price = session.price != null ? `$${session.price.toFixed(2)}` : null;
      const spots = session.spotsRemaining;
      const spotsClass = spots != null && spots < 5 ? 'card-spots spots-low' : 'card-spots';

      card.innerHTML = `
        <div class="card-time">
          <div class="time-start">${startFmt}</div>
          ${endFmt ? `<div class="time-end">until ${endFmt}</div>` : ''}
        </div>
        <div class="card-info">
          <div class="card-session-name">${session.name || 'Public Skate'}</div>
          <div class="card-rink">
            <span class="rink-dot" style="background:${rink.color}"></span>
            ${rink.name} · ${rink.location}
          </div>
        </div>
        <div class="card-meta">
          ${price ? `<span class="card-price">${price}</span>` : ''}
          ${spots != null ? `<span class="${spotsClass}">${spots} spots</span>` : ''}
        </div>
      `;

      container.appendChild(card);
      totalShown++;
    }
  }

  // Global empty state
  if (container.children.length === 0) {
    container.innerHTML = `
      <div class="state-box">
        <div class="state-icon">🏒</div>
        <div class="state-title">No sessions found</div>
        <div class="state-sub">Try a different date or check that the scraper has run.</div>
      </div>
    `;
  }
}

// ─── Load data ──────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(`schedule.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allData = await res.json();

    // Update last-updated
    const el = document.getElementById('last-updated');
    if (allData.scrapedAt) {
      const d = new Date(allData.scrapedAt);
      el.innerHTML = `<span class="status-dot"></span>Updated ${d.toLocaleString()}`;
    } else {
      el.innerHTML = `<span class="status-dot"></span>No scrape data yet`;
    }

    buildFilters();
    render();
  } catch (err) {
    console.error('Failed to load schedule.json:', err);
    document.getElementById('last-updated').textContent = '⚠ Could not load schedule data';
    document.getElementById('sessions-container').innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <div class="state-title">Could not load data</div>
        <div class="state-sub">Make sure schedule.json exists and the scraper has been run. ${err.message}</div>
      </div>
    `;
  }
}

// ─── Init ───────────────────────────────────────────────────────────────────
activeDate = todayStr();
buildDateNav();
loadData();
</script>
</body>
</html>
